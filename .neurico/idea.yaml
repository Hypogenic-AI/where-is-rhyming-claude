idea:
  title: Where is rhyming?
  domain: nlp
  hypothesis: 'The ability of language models to recognize rhyming is not solely encoded
    in word embeddings, as context-specific pronunciation plays a role. This research
    investigates where rhyming knowledge is represented within models and whether
    there exists a subspace for each IPA sound.

    '
  background:
    description: 'Models know when words rhyme. Is that all in the embeddings? It
      seems like it can''t be, because there is some level of context-specific pronounciation.
      So where is rhyming? And how is it structured? Is there a subspace for every
      IPA sound?

      '
  metadata:
